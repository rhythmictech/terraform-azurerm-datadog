---
formatter: "markdown table"

# Recurse into the nested submodules so each modules/<name>/README.md is kept in
# sync between its BEGIN_TF_DOCS / END_TF_DOCS markers.
recursive:
  enabled: true
  path: modules

sort:
  enabled: true
  by: name

output:
  file: README.md
  mode: inject
  template: |-
    <!-- BEGIN_TF_DOCS -->
    {{ .Content }}
    <!-- END_TF_DOCS -->

settings:
  anchor: true
  color: true
  default: true
  description: false
  escape: true
  hide-empty: false
  html: true
  indent: 2
  lockfile: true
  required: true
  sensitive: true
  type: true
